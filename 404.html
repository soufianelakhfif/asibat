<style>
  .err-wrap {
    min-height: calc(100vh - 84px);
    display: grid;
    place-items: center;
    background: var(--navy);
    color: white;
    position: relative;
    overflow: hidden;
  }
  .err-wrap::before {
    content: "";
    position: absolute;
    inset: -20% -10% auto auto;
    width: 60%; height: 80%;
    background: radial-gradient(ellipse at center, rgba(232,119,60,.22), transparent 60%);
    pointer-events: none;
  }
  .err-inner {
    text-align: left;
    max-width: 640px;
    padding: 80px 28px;
    position: relative;
    z-index: 1;
  }
  .err-code {
    font-family: var(--f-display);
    font-weight: 800;
    font-size: clamp(7rem, 18vw, 14rem);
    line-height: 0.85;
    letter-spacing: -0.06em;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .err-title {
    font-family: var(--f-display);
    font-size: clamp(1.8rem, 3.4vw, 2.6rem);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: white;
    margin: 0 0 18px;
    max-width: 18ch;
  }
  .err-sub {
    color: rgba(255,255,255,.74);
    font-size: 1.08rem;
    max-width: 48ch;
    margin: 0 0 36px;
  }
  .err-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .err-meta {
    margin-top: 56px;
    font-family: var(--f-mono);
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
  }
</style>
</head>

<header class="nav">
  <div class="container nav__inner">

      <img loading="eager" decoding="async" src="/uploads/logo-astibat.png" alt="ASTI.BAT — Maçonnerie & gros œuvre" class="brand__logo" />
    </a>
    <div class="nav__cta">
      <a href="/contact.html" class="btn btn-primary">Devis gratuit</a>
    </div>
  </div>
</header>

<section class="err-wrap">

    <h1 class="err-title">Cette page<br/>n'existe pas <em style="font-style: italic; color: var(--orange);">(ou plus)</em>.</h1>
    <p class="err-sub">
      Le lien que vous avez suivi est peut-être obsolète, ou l'adresse est mal orthographiée. Pas de souci, on remet le chantier d'aplomb.
    </p>
    <div class="err-actions">
      <a href="/" class="btn btn-primary">
        Retour à l'accueil
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
      <a href="/contact.html" class="btn btn-light">Nous contacter</a>
    </div>
    <div class="err-meta">— ASTI.BAT · Aucamville</div>
  </div>
</section>

</body>
</html>
